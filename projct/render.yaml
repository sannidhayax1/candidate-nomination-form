services:
  - type: web
    name: candidate-nomination-form
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        scope: build,runtime
        value: mongodb://localhost:27017/candidate_nomination
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: 10485760
